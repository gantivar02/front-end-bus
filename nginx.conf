# Configuracion de Nginx para servir la SPA de React.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: cualquier ruta que no sea un archivo real cae a index.html
  # para que React Router maneje el enrutamiento del lado del cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Los assets con hash en el nombre se cachean por mucho tiempo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Compresion para reducir el peso de la transferencia.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
