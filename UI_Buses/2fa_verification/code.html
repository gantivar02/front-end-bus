<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sentinel Security | 2FA Verification</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#360f00",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#ffede6",
                        "secondary-container": "#b5d0fd",
                        "tertiary": "#943700",
                        "on-secondary-container": "#3e5980",
                        "on-surface": "#191c1e",
                        "surface-variant": "#e0e3e5",
                        "surface-container-highest": "#e0e3e5",
                        "primary": "#004ac6",
                        "background": "#f7f9fb",
                        "secondary": "#455f87",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001c3b",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#b4c5ff",
                        "tertiary-fixed": "#ffdbcd",
                        "tertiary-container": "#bc4800",
                        "primary-container": "#2563eb",
                        "surface-tint": "#0053db",
                        "on-primary-fixed": "#00174b",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface": "#f7f9fb",
                        "on-background": "#191c1e",
                        "outline-variant": "#c3c6d7",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#adc8f5",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "inverse-primary": "#b4c5ff",
                        "on-secondary-fixed-variant": "#2d486d",
                        "secondary-fixed": "#d5e3ff",
                        "on-primary-container": "#eeefff",
                        "outline": "#737686",
                        "surface-container": "#eceef0",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#e6e8ea"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .code-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 74, 198, 0.1);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Background Decoration (Subtle Visual Interest) -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
</div>
<!-- Main Verification Card -->
<main class="w-full max-w-lg">
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0px_12px_32px_-4px_rgba(25,28,30,0.06)] relative overflow-hidden">
<!-- Branding / Logo -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface text-center">Verificación Sentinel</h1>
<p class="text-on-surface-variant text-center mt-2 body-md">Confirmación de identidad requerida</p>
</div>
<!-- Content -->
<div class="space-y-8">
<div class="text-center">
<p class="text-on-surface-variant mb-1">Hemos enviado un código de 6 dígitos a:</p>
<span class="font-semibold text-on-surface bg-surface-container-low px-3 py-1 rounded-full border border-outline-variant/15">u***@example.com</span>
</div>
<!-- 6-Digit Code Input -->
<form class="space-y-8">
<div class="flex justify-between gap-2 md:gap-4">
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value="7"/>
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value="2"/>
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-full aspect-square text-center text-2xl font-headline font-bold bg-surface-container-highest border-transparent rounded-lg focus:border-primary focus:ring-0 transition-all" maxlength="1" placeholder="·" type="text"/>
</div>
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded-xl hover:shadow-lg hover:shadow-primary/30 transition-all transform active:scale-[0.98]" type="submit">
                        Verificar Identidad
                    </button>
</form>
<!-- Timer & Resend -->
<div class="flex flex-col items-center space-y-4">
<div class="flex items-center gap-2 text-on-surface-variant font-medium">
<span class="material-symbols-outlined text-xl" data-icon="timer">timer</span>
<span>01:54</span>
</div>
<div class="w-full h-px bg-outline-variant/15"></div>
<p class="text-on-surface-variant text-sm">
                        ¿No recibiste el código? 
                        <button class="text-primary font-semibold hover:underline ml-1 focus:outline-none">Reenviar código</button>
</p>
</div>
</div>
<!-- Decorative corner accent -->
<div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-6xl" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<!-- Footer / Help Link -->
<footer class="mt-8 flex justify-center items-center gap-6 text-on-surface-variant label-sm uppercase tracking-widest">
<a class="hover:text-primary transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-lg" data-icon="help_outline">help_outline</span>
                Soporte
            </a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Términos</a>
</footer>
</main>
</body></html>
