<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sentinel Security - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#360f00",
                    "inverse-surface": "#2d3133",
                    "on-tertiary-container": "#ffede6",
                    "secondary-container": "#b5d0fd",
                    "tertiary": "#943700",
                    "on-secondary-container": "#3e5980",
                    "on-surface": "#191c1e",
                    "surface-variant": "#e0e3e5",
                    "surface-container-highest": "#e0e3e5",
                    "primary": "#004ac6",
                    "background": "#f7f9fb",
                    "secondary": "#455f87",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#001c3b",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#b4c5ff",
                    "tertiary-fixed": "#ffdbcd",
                    "tertiary-container": "#bc4800",
                    "primary-container": "#2563eb",
                    "surface-tint": "#0053db",
                    "on-primary-fixed": "#00174b",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "surface": "#f7f9fb",
                    "on-background": "#191c1e",
                    "outline-variant": "#c3c6d7",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "surface-bright": "#f7f9fb",
                    "secondary-fixed-dim": "#adc8f5",
                    "inverse-on-surface": "#eff1f3",
                    "surface-dim": "#d8dadc",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "inverse-primary": "#b4c5ff",
                    "on-secondary-fixed-variant": "#2d486d",
                    "secondary-fixed": "#d5e3ff",
                    "on-primary-container": "#eeefff",
                    "outline": "#737686",
                    "surface-container": "#eceef0",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#dbe1ff",
                    "on-primary-fixed-variant": "#003ea8",
                    "surface-container-high": "#e6e8ea"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-mesh {
        background-color: #f7f9fb;
        background-image: 
          radial-gradient(at 0% 0%, hsla(217,100%,95%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(217,100%,98%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(217,100%,94%,1) 0, transparent 50%);
      }
    </style>
</head>
<body class="bg-mesh font-body text-on-surface min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-md">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary-container mb-4 shadow-lg">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Sentinel Security</h1>
<p class="text-on-surface-variant font-medium">Smart Bus Management System</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_-4px_rgba(25,28,30,0.06)] border border-outline-variant/20">
<h2 class="font-headline text-xl font-bold mb-6 text-on-surface">Iniciar Sesión</h2>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="email">
                        Email
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3 pl-11 pr-4 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline" id="email" name="email" placeholder="nombre@sentinel.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-xs font-semibold text-primary hover:underline transition-all" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3 pl-11 pr-4 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-3.5 rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Acceder al Sistema</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant font-medium">o continúa con</span>
</div>
</div>
<!-- OAuth Options -->
<div class="grid grid-cols-3 gap-3">
<button class="flex items-center justify-center py-2.5 px-2 bg-surface-container-low border border-outline-variant/20 rounded-lg hover:bg-surface-container transition-colors group">
<img alt="Google" class="w-5 h-5" data-alt="Official Google logo with bright blue, red, yellow, and green colors on a white background for OAuth authentication button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNCYGEj9qKQORjnHF0F7lSx_BQSpo-zMAZH_jUx4Ize3h6N4na0zuvlP__UVoOa7jra5HZeBjAI8NQvzQmjewm1yZMFHe04wtKiCVAi2eerst7CSNdleE1Vtd7pKXGy9h0YYCrmR6CyYE-P-uWb8BQ5kg7lhwSRc7nynzMa2uAYN20NAVEU6gQFdAGxs3t4vGJRTHGcl_3WOIT6n-qaqCbeq2ev9ZIjoDNRFo8mt_2bBsYnvdjoHxRuR7YrU6-EYCkVchjChPDrck"/>
</button>
<button class="flex items-center justify-center py-2.5 px-2 bg-surface-container-low border border-outline-variant/20 rounded-lg hover:bg-surface-container transition-colors group">
<img alt="GitHub" class="w-5 h-5" data-alt="Official minimalist GitHub octocat logo in black on a white circular background for developer authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzre99Yw0Yxe3KRU7jsYxw8Ogos0qeROZvDmP8jq4DAiYy2AFGKf61n1EwskqkNvrGoqJ2Nh0fdu7bjoyIt-6ePh6d6LjtV51qd1tZ5xllnMVRDMaxM8yfO2rbzQiaxJLWNs3z0jaC-_tuWnS9gb3tvaDdAQ8TnjDZ4DVkd4eG-A6DusP3H7JENqk1HOqq6YiiDpLeNm6__83s-lsLveiFr1I6RAKubnMyYFaQmuXUrZDotw9RRCeCZBrgOqJYZIkYCMsTbCLeqoo"/>
</button>
<button class="flex items-center justify-center py-2.5 px-2 bg-surface-container-low border border-outline-variant/20 rounded-lg hover:bg-surface-container transition-colors group">
<img alt="Microsoft" class="w-5 h-5" data-alt="Official Microsoft four-color square logo representing Windows software and enterprise authentication services" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA72h_VbmOqsQwFCu5hMPw6bppJv5FO7OU_SbtPKotaMKEdDpg-fjgby00iocE3gB6deiM0a1JPRZPOt5Pr3aT5u4jbP6i-BxBc0QmJtNejop16xfyoyGioU9UiRJXDb8whAidzK3ZMjRYZF8M1O4wwgHD5PkznwdruspBbLRURSu_hkM3b6nXHJL6Wl6rCPYDmCQ4xeEs4FDfWJFtn1DCz7_XxMmY1KK16sFvJDFcDC8wgqmCN7L_CnKdqfEfcsDDomYTsQjOTbnU"/>
</button>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                ¿No tienes una cuenta? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Registrarse</a>
</p>
</div>
<!-- System Status Bar (Sentinel Context) -->
<div class="mt-12 pt-8 border-t border-outline-variant/30 flex justify-between items-center px-4">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-success-600 animate-pulse bg-green-500"></div>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">Servidores Activos</span>
</div>
<div class="flex gap-4">
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-outline hover:text-primary cursor-pointer transition-colors">Términos</span>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-outline hover:text-primary cursor-pointer transition-colors">Privacidad</span>
</div>
</div>
</main>
<!-- Decorative Elements (Layered Background Concept) -->
<div class="fixed top-20 right-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-10 left-[-5%] w-[30%] h-[30%] bg-secondary-container/10 blur-[100px] rounded-full -z-10"></div>
</body></html>
